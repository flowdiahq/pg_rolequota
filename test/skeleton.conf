# Minimal postgresql.conf snippet for the regression test suite.
# 2 spaces per AGENTS.md.

shared_preload_libraries = 'pg_rolequota'

# Make the launcher quiet during tests: long timer so it does an eager
# first pass on startup and then sleeps. We rely on producers (the
# request_wakeup* SQL functions) to SetLatch the launcher when they need
# a per-DB worker spawned. This keeps the test_multi_db cleanup from
# racing against the launcher's polling cycle.
pg_rolequota.launcher_interval = 3600

# Match scan_interval default — tests use request_wakeup() to bypass the
# poll.
pg_rolequota.scan_interval = 3600

# We spawn at most one worker per DB; with up to ~3 DBs in the test
# matrix (contrib_regression + rq_a + rq_b), 16 is plenty.
pg_rolequota.max_workers = 16

# pg_regress runs all 11 tests sequentially. Each can spawn a worker
# per DB, plus the launcher itself, plus parallel-worker headroom. Bump
# the postmaster's BGW pool so we don't hit OOM on dynamic registration.
max_worker_processes = 32
